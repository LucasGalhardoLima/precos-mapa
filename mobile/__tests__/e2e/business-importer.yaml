# E2E: Business user importer tab, verify upload area
# Precondition: User is logged in with business role
appId: com.poup.consumer
---
- launchApp

# Navigate to importer tab
- tapOn:
    text: "Importador"
    optional: true
- waitForAnimationToEnd

# Should see the importer interface
- assertVisible:
    text: "Importador"
    optional: true

# Upload area or instructions should be visible
- assertVisible:
    text: "importar"
    optional: true

# Go back to dashboard
- tapOn:
    text: "Dashboard"
    optional: true
