# E2E: Open map tab, verify map loads, interact with markers
# Precondition: Metro running on 8081
appId: com.poup.consumer
---
- launchApp

# Sign in if on onboarding
- runFlow:
    when:
      visible: "Começar"
    commands:
      - tapOn: "Já tenho conta"
      - waitForAnimationToEnd
      - tapOn: "Entrar com email"
      - waitForAnimationToEnd
      - tapOn:
          text: "Email"
      - inputText: "testconsumer@gmail.com"
      - hideKeyboard
      - tapOn:
          text: "Senha"
      - inputText: "TestConsumer2026"
      - hideKeyboard
      - tapOn: "Entrar"
      - extendedWaitUntil:
          visible: "Início"
          timeout: 10000

# Dismiss iOS "Save Password?" dialog if present
- runFlow:
    when:
      visible: "Agora Não"
    commands:
      - tapOn: "Agora Não"
      - waitForAnimationToEnd

# Navigate to map tab
- tapOn: "Mapa"
- waitForAnimationToEnd

# Wait for map to load markers
- waitForAnimationToEnd
- waitForAnimationToEnd

# If location is denied, the permission banner may appear
- assertVisible:
    text: "Permita acesso à localização"
    optional: true

# Try tapping center of screen (likely a map marker area)
- tapOn:
    point: "50%,40%"
    optional: true

# Wait for any bottom sheet animation
- waitForAnimationToEnd

# If a store marker was tapped, the store sheet should show distance
- assertVisible:
    text: "km"
    optional: true
