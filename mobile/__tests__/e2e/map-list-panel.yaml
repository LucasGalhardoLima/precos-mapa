# E2E: Map tab with shopping list items, open list panel, verify stores
# Precondition: Metro running on 8081
# Data dependency: Supabase must have promotions matching "Leite" (if list is empty)
# Auth: testconsumer@gmail.com / TestConsumer2026 (consumer role)
appId: com.poup.app
---
- launchApp

# Sign in if on onboarding
- runFlow:
    when:
      visible: "Começar"
    commands:
      - tapOn: "Já tenho conta"
      - waitForAnimationToEnd
      - tapOn: "Entrar com email"
      - waitForAnimationToEnd
      - tapOn:
          text: "Email"
      - inputText: "testconsumer@gmail.com"
      - hideKeyboard
      - tapOn:
          text: "Senha"
      - inputText: "TestConsumer2026"
      - hideKeyboard
      - tapOn: "Entrar"
      - extendedWaitUntil:
          visible: "Início"
          timeout: 10000

# Dismiss iOS "Save Password?" dialog if present
- runFlow:
    when:
      visible: "Agora Não"
    commands:
      - tapOn: "Agora Não"
      - waitForAnimationToEnd

# Ensure list has items — navigate to list first
- tapOn: "Lista"
- waitForAnimationToEnd

# If empty, add an item
- runFlow:
    when:
      visible: "Sua lista está vazia"
    commands:
      - tapOn: "Adicionar"
      - waitForAnimationToEnd
      - tapOn:
          text: "Buscar produto..."
          optional: true
      - inputText: "Leite"
      - pressKey: Enter
      - waitForAnimationToEnd
      - tapOn:
          text: "Leite"
          index: 0
          optional: true
      - tapOn:
          text: "Adicionar à lista"
          optional: true
      - waitForAnimationToEnd

# Navigate to map tab
- tapOn: "Mapa"
- waitForAnimationToEnd

# Wait for map to load
- waitForAnimationToEnd
- waitForAnimationToEnd

# Floating pill should be visible when list has items
- assertVisible:
    text: "Ver minha lista"
    optional: true

# Tap to open the list panel
- tapOn:
    text: "Ver minha lista"
    optional: true
- waitForAnimationToEnd

# Bottom sheet should show items grouped by store
- assertVisible:
    text: "Itens da lista por mercado"
    optional: true

# Route button should be available per store
- assertVisible:
    text: "Rota"
    optional: true
