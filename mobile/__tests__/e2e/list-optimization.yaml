# E2E: Shopping list with items, verify savings card, open route
# Precondition: Metro running on 8081
# Data dependency: Supabase must have promotions matching "Arroz" (if list is empty)
# Auth: testconsumer@gmail.com / TestConsumer2026 (consumer role)
appId: com.precomapa.consumer
---
- launchApp

# Sign in if on onboarding
- runFlow:
    when:
      visible: "Começar"
    commands:
      - tapOn: "Já tenho conta"
      - waitForAnimationToEnd
      - tapOn: "Entrar com email"
      - waitForAnimationToEnd
      - tapOn:
          text: "Email"
      - inputText: "testconsumer@gmail.com"
      - hideKeyboard
      - tapOn:
          text: "Senha"
      - inputText: "TestConsumer2026"
      - hideKeyboard
      - tapOn: "Entrar"
      - extendedWaitUntil:
          visible: "Início"
          timeout: 10000

# Dismiss iOS "Save Password?" dialog if present
- runFlow:
    when:
      visible: "Agora Não"
    commands:
      - tapOn: "Agora Não"
      - waitForAnimationToEnd

# Navigate to list tab
- tapOn: "Lista"
- waitForAnimationToEnd

# If list is empty, add an item first via the add button
- runFlow:
    when:
      visible: "Sua lista está vazia"
    commands:
      - tapOn: "Adicionar"
      - waitForAnimationToEnd
      - tapOn:
          text: "Buscar produto..."
          optional: true
      - inputText: "Arroz"
      - pressKey: Enter
      - waitForAnimationToEnd
      - tapOn:
          text: "Arroz"
          index: 0
          optional: true
      - tapOn:
          text: "Adicionar à lista"
          optional: true
      - tapOn: "Lista"
      - waitForAnimationToEnd

# Savings card should be visible
- assertVisible:
    text: "economia estimada"
    optional: true

# Item count visible
- assertVisible:
    text: "item"
    optional: true

# Route button should be visible
- assertVisible:
    text: "Ver rota"
    optional: true
