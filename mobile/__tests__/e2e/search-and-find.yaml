# E2E: Search for a product, verify results, change sort, tap result
# Precondition: Metro running on 8081
appId: com.precomapa.consumer
---
- launchApp

# Sign in if on onboarding
- runFlow:
    when:
      visible: "Começar"
    commands:
      - tapOn: "Já tenho conta"
      - waitForAnimationToEnd
      - tapOn: "Entrar com email"
      - waitForAnimationToEnd
      - tapOn:
          text: "Email"
      - inputText: "testconsumer@gmail.com"
      - hideKeyboard
      - tapOn:
          text: "Senha"
      - inputText: "TestConsumer2026"
      - hideKeyboard
      - tapOn: "Entrar"
      - extendedWaitUntil:
          visible: "Início"
          timeout: 10000

# Dismiss iOS "Save Password?" dialog if present
- runFlow:
    when:
      visible: "Agora Não"
    commands:
      - tapOn: "Agora Não"
      - waitForAnimationToEnd

# Navigate to search tab
- tapOn: "Busca"

# Should see the search hint
- assertVisible: "Pesquise um produto para comparar preços"

# Type a product name
- tapOn:
    text: "Buscar produto..."
- inputText: "Leite"
- pressKey: Enter
- waitForAnimationToEnd

# Sort tabs should be visible
- assertVisible: "Menor preço"
- assertVisible: "Distância"
- assertVisible: "Desconto"

# Verify at least one result appeared (product name containing Leite)
- assertVisible:
    text: "Leite"

# Switch sort mode
- tapOn: "Distância"
- waitForAnimationToEnd

# Results should still be visible after sort change
- assertVisible:
    text: "Leite"

# Switch to discount sort
- tapOn: "Desconto"
- waitForAnimationToEnd
